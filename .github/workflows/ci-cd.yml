name: Rust Server CI/CD

on:
  push:
    branches: [ "master", "dev" ] 
  pull_request:
    branches: [ "master", "dev" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # 1. CI GATE: Run on every single PR and Push
  test-and-build:
    runs-on: self-hosted-rust
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Tests
        run: |
          cd server/
          cargo test --verbose

  # 2. DEV DEPLOY: Only runs on the 'dev' branch
  deploy-development:
    needs: test-and-build
    if: github.ref == 'refs/heads/dev'
    runs-on: self-hosted-rust
    environment: development
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build Dev Environment
        run: |
          cd server/
          docker compose -f docker-compose-dev.yml up -d --build

  # 3. PROD DEPLOY: Only runs on the 'master' branch
  deploy-production:
    needs: test-and-build
    if: github.ref == 'refs/heads/master'
    runs-on: self-hosted-rust
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build and Deploy Prod
        run: |
          cd server/
          docker compose up -d --build